[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "btw-bridge"
version = "0.1.0"
description = "BLE readings to JSON envelope and network sinks"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
  "btw-core>=0.1.0",
  "pydantic>=2.5",
  "httpx>=0.26",
  "websockets>=12.0",
  "aiomqtt>=2.0",
]

[project.scripts]
btw-gw = "btw_bridge.cli:main"

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.23", "ruff>=0.3"]

[tool.hatch.build.targets.wheel]
packages = ["src/btw_bridge"]
