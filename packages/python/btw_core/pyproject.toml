[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "btw-core"
version = "0.1.0"
description = "BLE core: scan, connect, device abstraction, parsers"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [{ name = "bluetooth-to-wifi" }]
keywords = ["ble", "bluetooth", "gatt", "iot"]
dependencies = [
  "bleak>=0.21.0,<4",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.23", "ruff>=0.3"]

[project.scripts]

[tool.hatch.build.targets.wheel]
packages = ["src/btw_core"]

[tool.ruff]
line-length = 100
target-version = "py310"
